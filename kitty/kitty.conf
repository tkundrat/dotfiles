# import theme
include current-theme.conf

# import work config
include work-kitty.conf

# font settings
font_family CaskaydiaCove NF SemiLight
bold_font CaskaydiaCove NF Bold
italic_font CaskaydiaCove NF SemiLight Italic
bold_italic_font CaskaydiaCove NF Bold Italic
font_size 11.5
font_features CaskaydiaCove NF +calt +frac +ss02 +ss19 +ss20 +cv14
disable_ligatures always

# mouse pointer settings
default_pointer_shape arrow
pointer_shape_when_dragging beam
pointer_shape_when_grabbed hand

# terminal bell settings
enable_audio_bell no
visual_bell_duration 0.2

# window layout settings
hide_window_decorations yes
window_padding_width 4

# OS specific tweaks
#linux_display_server x11

# keyboard shortcuts
map kitty_mod+p change_font_size current 20.0
map kitty_mod+1 change_font_size current 12.5
map kitty_mod+0 change_font_size current 0
map kitty_mod+, change_font_size current -2.0
map kitty_mod+. change_font_size current +2.0

# default window size
initial_window_height 30c
initial_window_width 80c

# clipboard settings
clipboard_control write-clipboard write-primary no-append
